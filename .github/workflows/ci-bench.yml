name: ci-bench

# BENCH-01 — reproducible adversarial measurement harness.
# Runs the canonical govern-the-verb workload over the real ML-DSA-87 / SHA3-256
# / HKDF-SHA-384 primitives, then HARD-fails the build on any security or size
# regression vs bench/baseline.json (tools/bench-gate.mjs).

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      # Reproducibility: install from the committed lockfile only.
      - run: npm ci
      # Produce a fresh measurement report (also a smoke test: the runner exits
      # non-zero if a valid trace is rejected or an attack trace is accepted).
      - run: npm run bench
      # Regression gate: sizes + adversarial verdicts must match the baseline.
      - run: npm run bench:gate
      # Real-path harness drives the actual permit code in dist/ — build first.
      - run: npm run build
      - run: npm run bench:permit
      - run: npm run bench:permit:gate
