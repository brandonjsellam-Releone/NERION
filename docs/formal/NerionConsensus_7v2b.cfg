\*
\* Near-boundary config: 7 validators, 2 Byzantine (28.6% < 1/3). HonestAgreement
\* is NON-vacuous and must hold close to the 1/3 safety threshold. Machine-checked:
\* 3888 distinct states, no error.
SPECIFICATION Spec

CONSTANTS
    Validators = {v1, v2, v3, v4, v5, v6, v7}
    Byzantine  = {v1, v2}
    Heights    = {h1}
    Blocks     = {ba, bb}
    Stake <- EqualStake

INVARIANTS
    TypeOK
    NoHonestEquivocation
    AccountableSafety
    HonestAgreement
    QuorumIntegrity
