\*
\* Larger config: 6 validators, 1 Byzantine (16.7% < 1/3). HonestAgreement is
\* NON-vacuous here (honest supermajority) and must hold — no two distinct blocks
\* finalize at one height. Machine-checked: 972 distinct states, no error.
SPECIFICATION Spec

CONSTANTS
    Validators = {v1, v2, v3, v4, v5, v6}
    Byzantine  = {v1}
    Heights    = {h1}
    Blocks     = {ba, bb}
    Stake <- EqualStake

INVARIANTS
    TypeOK
    NoHonestEquivocation
    AccountableSafety
    HonestAgreement
    QuorumIntegrity
