\*
\* TLC model for NerionConsensus. Default config: 4 equal-stake validators, two
\* of them Byzantine (50% stake) so that two distinct blocks CAN both finalize —
\* this exercises AccountableSafety non-vacuously. With Byzantine = {v1,v2} the
\* HonestAgreement antecedent (Byzantine < 1/3) is false, so it holds vacuously;
\* flip Byzantine to {v1} to exercise HonestAgreement non-vacuously instead.
SPECIFICATION Spec

CONSTANTS
    Validators = {v1, v2, v3, v4}
    Byzantine  = {v1, v2}
    Heights    = {h1}
    Blocks     = {ba, bb}
    Stake <- EqualStake

INVARIANTS
    TypeOK
    NoHonestEquivocation
    AccountableSafety
    HonestAgreement
    QuorumIntegrity
