\* 4 validators, 2 Byzantine (25%): HonestAgreementUnderSkip non-vacuous (no fork despite skip)
\* (two blocks CAN finalize via equivocation). MaxRound 3 exercises arbitrary skips.
SPECIFICATION Spec
CONSTANTS
    Validators = {v1, v2, v3, v4}
    Byzantine  = {v1}
    Heights    = {h1}
    Blocks     = {ba, bb}
    MaxRound   = 3
    Stake <- EqualStake
INVARIANTS
    TypeOK
    FinalizationNeedsQuorum
    SafetyUnderRoundSkip
    HonestAgreementUnderSkip
